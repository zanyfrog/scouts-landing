<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Troop 883</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260426-adults-route" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div>
          <p class="eyebrow">Troop 883</p>
          <h1>Troop 883</h1>
          <p class="intro">
            A clickable preview of the public landing page, role-based dashboard,
            event detail views, and the reporting decisions captured in the updated
            requirements.
          </p>
        </div>
        <div class="header-actions">
          <label class="view-toggle">
            <span>View mode</span>
            <select id="modeSelect" aria-label="Select view mode">
              <option value="public">Public visitor</option>
              <option value="scout">Scout dashboard</option>
              <option value="parent">Parent dashboard</option>
              <option value="adult-leader">Adult leader dashboard</option>
              <option value="committee">Committee dashboard</option>
              <option value="admin">Administrator dashboard</option>
            </select>
          </label>
          <a class="requirements-link" href="updated_scout_requirements.md" target="_blank" rel="noreferrer">Open updated requirements</a>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <template id="publicTemplate">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Public landing page</p>
          <h2>Adventure, leadership, and a troop community that families can join.</h2>
          <p>
            This non-logged-in version highlights the most recent and upcoming events,
            presents event imagery, and invites families to explore the full event details.
          </p>
          <div class="hero-actions">
            <a href="#upcoming-events" class="button primary">See upcoming events</a>
            <a href="#recent-events" class="button secondary">Browse recent events</a>
          </div>
        </div>
        <div class="hero-card">
          <p class="hero-card-label">Next upcoming event</p>
          <h3 id="heroEventTitle"></h3>
          <p id="heroEventMeta" class="hero-event-meta"></p>
          <p id="heroEventDescription"></p>
          <a id="heroEventLink" class="text-link" href="#event-detail">View full event details</a>
        </div>
      </section>

      <section class="section" id="upcoming-events">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Upcoming</p>
            <h2>What is next for the troop</h2>
          </div>
          <p class="section-copy">
            Public visitors see the upcoming event first, with an image and a path to deeper details.
          </p>
        </div>
        <div id="upcomingGrid" class="event-grid"></div>
      </section>

      <section class="section" id="recent-events">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Recent</p>
            <h2>Recent troop highlights</h2>
          </div>
          <p class="section-copy">
            The landing page keeps the latest troop moments front and center in a newsletter-style layout.
          </p>
        </div>
        <div id="recentGrid" class="event-grid"></div>
      </section>

      <section class="section" id="event-detail">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Details</p>
            <h2>Full event details</h2>
          </div>
          <p class="section-copy">
            Each public event can open to a richer details view with imagery, timing, and location.
          </p>
        </div>
        <div id="publicDetailCards" class="detail-stack"></div>
      </section>
    </template>

    <template id="dashboardTemplate">
      <section class="dashboard-banner">
        <div>
          <p class="eyebrow" id="dashboardEyebrow"></p>
          <h2 id="dashboardTitle"></h2>
          <p id="dashboardIntro" class="intro compact"></p>
        </div>
        <div class="status-chip">
          <span>Post-login destination</span>
          <strong>Role-based dashboard</strong>
        </div>
      </section>

      <section class="section dashboard-grid">
        <article class="panel">
          <div class="panel-heading">
            <h3>Today</h3>
            <p>Personalized access driven by role.</p>
          </div>
          <ul id="dashboardTasks" class="detail-list"></ul>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h3>Attendance decisions</h3>
            <p>Current rules resolved from the updated requirements.</p>
          </div>
          <ul class="detail-list">
            <li>Statuses: Present, Absent</li>
            <li>Non-regular-meeting attendance can be marked by any adult leader</li>
            <li>Regular meeting attendance continues to support the Scribe workflow</li>
          </ul>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h3>Reports</h3>
            <p>Visibility follows access to the underlying troop data.</p>
          </div>
          <ul id="reportList" class="detail-list"></ul>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h3>Calendar sync behavior</h3>
            <p>Direct Google Calendar changes should flow into the site.</p>
          </div>
          <div class="sync-card">
            <div>
              <span class="sync-label">Edited outside the site</span>
              <strong>Reflect updated details</strong>
            </div>
            <div>
              <span class="sync-label">Deleted outside the site</span>
              <strong>Remove from the site view</strong>
            </div>
          </div>
        </article>
      </section>

      <section class="section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Events</p>
            <h2>Event detail preview</h2>
          </div>
          <p class="section-copy">Each event includes a direct route to richer details.</p>
        </div>
        <div id="detailCards" class="event-grid"></div>
      </section>

      <section class="section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Deep dive</p>
            <h2>Expanded event details</h2>
          </div>
          <p class="section-copy">A fuller event page can carry schedule, audience, and reporting context.</p>
        </div>
        <div id="dashboardDetailCards" class="detail-stack"></div>
      </section>
    </template>

    <template id="eventCardTemplate">
      <article class="event-card">
        <div class="image-wrap">
          <img alt="" />
          <span class="category-pill"></span>
        </div>
        <div class="event-content">
          <p class="event-date"></p>
          <h3></h3>
          <p class="event-description"></p>
          <div class="event-meta"></div>
          <a class="text-link" href="#event-detail">View full event details</a>
        </div>
      </article>
    </template>

    <template id="eventDetailTemplate">
      <article class="detail-panel">
        <img alt="" class="detail-image" />
        <div class="detail-body">
          <p class="event-date"></p>
          <h3></h3>
          <p class="event-description"></p>
          <div class="event-meta"></div>
          <div class="detail-note"></div>
        </div>
      </article>
    </template>

    <script src="app.js?v=20260426-adults-route"></script>
  </body>
</html>
