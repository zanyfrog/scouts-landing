services:
  scouts-landing:
    build:
      context: ..
      dockerfile: ./scouts-landing/Dockerfile
    image: scouts-landing:latest
    ports:
      - "${PORT:-4177}:4173"
    environment:
      PORT: 4173
      ORM_BASE_URL: "${ORM_BASE_URL:-http://scouts-orm:4174}"
      AUTH_BASE_URL: "${AUTH_BASE_URL:-http://host.docker.internal:3000}"
    volumes:
      - scouts-landing-resources:/app/resources
    networks:
      - default
      - scouts-orm
    restart: unless-stopped

volumes:
  scouts-landing-resources:

networks:
  scouts-orm:
    external: true
    name: scoutsorm_default
